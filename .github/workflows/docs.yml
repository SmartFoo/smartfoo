name: Publish API Docs to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Only one Pages deployment at a time; do not cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-docs:
    name: Build and deploy Dokka HTML
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JAVA_VERSION: 21
    defaults:
      run:
        shell: bash
        working-directory: ./android
    steps:
      - name: Checkout code and submodule(s)
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'jetbrains'
          cache: gradle

      - run: chmod +x gradlew

      - name: Generate Dokka HTML
        run: ./gradlew :smartfoo-android-lib-core:dokkaGeneratePublicationHtml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: android/smartfoo-android-lib-core/build/dokka/html
          commit_message: "docs: update API docs for ${{ github.ref_name }}"
